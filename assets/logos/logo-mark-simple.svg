<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-label="NEXOCOOP">
  <defs>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="nGradStrong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="nInk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F4F4F7"/>
      <stop offset="100%" stop-color="#D8DBE5"/>
    </linearGradient>
    <radialGradient id="nHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06070D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- HALO -->
  <circle cx="60" cy="60" r="56" fill="url(#nHalo)"/>

  <!-- SÍMBOLO -->
  <!-- Anillo exterior fino (consciencia) -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="url(#nGrad)" stroke-width="1.4" opacity="0.85"/>

  <!-- Arco crescent superior derecho (cooperación / Co-Operator) -->
  <path d="M 60 22 A 38 38 0 0 1 98 60" fill="none" stroke="url(#nGrad)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Núcleo sólido (identidad) -->
  <circle cx="60" cy="60" r="9" fill="url(#nGradStrong)"/>
  <circle cx="60" cy="60" r="3" fill="#06070D"/>

  <!-- Satélite ámbar superior derecho (conexión humana) -->
  <circle cx="92" cy="32" r="2.4" fill="#F59E0B"/>
  <circle cx="92" cy="32" r="4.5" fill="#F59E0B" opacity="0.18"/>

  <!-- WORDMARK -->
  <g font-family="'Manrope','Inter',system-ui,sans-serif">
    <text x="128" y="68" font-size="36" font-weight="800" letter-spacing="-0.5" fill="url(#nInk)">NEXO</text>
    <text x="248" y="68" font-size="36" font-weight="800" letter-spacing="-0.5" fill="url(#nGrad)">COOP</text>
    <text x="128" y="88" font-size="9" font-weight="500" letter-spacing="3.6" fill="#6E6E76" font-family="'JetBrains Mono','Inter',monospace">COGNITIVE  CO-OPERATORS</text>
  </g>
</svg>
