<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="NEXOCOOP mark">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="mGradInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="mGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06070D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- glow halo -->
  <circle cx="40" cy="40" r="38" fill="url(#mGlow)"/>
  <!-- outer ring (consciousness) -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="url(#mGrad)" stroke-width="1.5" opacity="0.85"/>
  <!-- co- crescent (cooperation arc) -->
  <path d="M 40 12 A 28 28 0 0 1 68 40" fill="none" stroke="url(#mGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- inner ring (memory/processing) -->
  <circle cx="40" cy="40" r="17" fill="none" stroke="url(#mGradInner)" stroke-width="2.5"/>
  <!-- core (identity) -->
  <circle cx="40" cy="40" r="7" fill="url(#mGradInner)"/>
  <circle cx="40" cy="40" r="2.6" fill="#06070D"/>
  <!-- satellite nodes (evolution, connections) -->
  <circle cx="68" cy="40" r="2.4" fill="#22D3EE"/>
  <circle cx="22.5" cy="58" r="1.8" fill="#A855F7" opacity="0.85"/>
  <circle cx="55" cy="14.5" r="1.4" fill="#F59E0B" opacity="0.9"/>
</svg>
